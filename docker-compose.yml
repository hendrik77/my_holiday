services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/my-holiday.db
      API_HOST: "0.0.0.0"
      # Multi-user mode (ADR-0006): set POSTGRES_PASSWORD in a .env file,
      # start the db service via
      #   docker compose --profile postgres up
      # and switch the app to it with:
      # DB_DRIVER: postgres
      # DATABASE_URL: postgres://holiday:${POSTGRES_PASSWORD}@db:5432/holiday
    restart: unless-stopped

  # Optional PostgreSQL backend — only needed for multi-user mode.
  db:
    image: postgres:17-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: holiday
      # No default on purpose — compose refuses to start without a password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env for the postgres profile}
      POSTGRES_DB: holiday
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holiday"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
