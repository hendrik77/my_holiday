version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-tooling:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
          - "vite*"
          - "vitest*"
          - "playwright*"
          - "@playwright*"
          - "tsx"
          - "esbuild"
          - "typescript"
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
