name: CI

on:
  push:
    branches: [main, docker, v2-development, v3-multi-user]
  pull_request:

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: holiday
          POSTGRES_PASSWORD: holiday
          POSTGRES_DB: holiday_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U holiday"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Enables the PostgreSQL leg of the repo contract suite (ADR-0006).
      TEST_DATABASE_URL: postgres://holiday:holiday@localhost:5432/holiday_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm audit --audit-level=high
      - run: npm test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false            # validation only; release.yml still publishes
          cache-from: type=gha
          cache-to: type=gha,mode=max
