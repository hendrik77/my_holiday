# Local multi-user (OIDC) verification stack — NOT for production.
#
#   docker compose -f docker-compose.dev-keycloak.yml up
#
# Brings up PostgreSQL and a Keycloak dev server with a pre-imported
# "my-holiday" realm (client id "my-holiday", secret "dev-secret", redirect
# http://localhost:3001/api/v1/auth/callback, one user alice/alice). Then run
# the API against it:
#
#   DB_DRIVER=postgres \
#   DATABASE_URL=postgres://holiday:holiday@localhost:5432/holiday \
#   AUTH_MODE=oidc \
#   OIDC_ISSUER_URL=http://localhost:8080/realms/my-holiday \
#   OIDC_CLIENT_ID=my-holiday \
#   OIDC_CLIENT_SECRET=dev-secret \
#   PUBLIC_BASE_URL=http://localhost:3001 \
#   SESSION_SECRET=dev-session-secret-at-least-32-bytes! \
#   ADMIN_EMAILS=alice@example.com \
#   NODE_ENV=production npm run build && npm run server
#
# Open http://localhost:3001, sign in as alice/alice, and verify the manual
# OIDC end-to-end path (login → book leave → create a PAT → logout).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
      POSTGRES_DB: holiday
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holiday"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./docs/dev/keycloak-realm.json:/opt/keycloak/data/import/my-holiday-realm.json:ro
